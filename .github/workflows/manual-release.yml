name: Manual Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (must start with v, e.g. v1.3.2)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark this release as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and normalize version input
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version input is required."
          }
          # Auto-prepend 'v' if missing
          if ($version -notmatch '^v') {
            $version = "v$version"
          }
          if ($version -notmatch '^v\d+\.\d+\.\d+([-.][A-Za-z0-9]+)?$') {
            throw "Version '$version' is invalid. Use format like 1.3.2 or v1.3.2 or v1.3.2-beta."
          }
          Write-Host "Using version: $version"
          echo "tag=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop portable exe
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}
        run: npm run build:desktop:portable

      - name: Verify release exe exists
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release -Filter *.exe -File
          if (-not $files) {
            throw "No EXE files found in release directory."
          }
          $files | ForEach-Object { Write-Host "Found release artifact: $($_.FullName)" }

      - name: Create and push release tag
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $existingTag = git tag -l $version
          if ([string]::IsNullOrWhiteSpace($existingTag)) {
            git tag $version
            git push origin $version
          } else {
            Write-Host "Tag $version already exists; continuing."
          }

      - name: Publish GitHub release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ inputs.release_name || steps.version.outputs.tag }}
          files: release/*.exe
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
